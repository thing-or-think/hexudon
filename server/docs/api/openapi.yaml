openapi: 3.1.0
info:
  title: HEXUDON Server API Reference
  description: Tài liệu OpenAPI 3.1 cho máy chủ HEXUDON
  version: 0.1.0
servers:
  - url: /
tags:
  - name: Admin
    description: Thiết lập & vòng đời trận đấu (chỉ admin)
  - name: Config
    description: Cấu hình bảng / trận đấu mà máy khách đọc trước khi chơi
  - name: Play
    description: Lối chơi của đội (chọn loại Agent, nộp kế hoạch, đọc ngày)
  - name: State & History
    description: Trạng thái trực tiếp, bảng xếp hạng, lịch sử và replay
  - name: Practice
    description: Game luyện tập tự chọn tốc độ cho từng đội

paths:
  /api/game/generate:
    post:
      tags:
        - Admin
      summary: Tạo bản xem trước bản đồ hợp lệ theo luật (Public / Admin)
      description: Tạo ngẫu nhiên một sơ đồ bảng chơi hợp lệ có kết nối, quy định vị trí các cửa hàng mì Udon mà không cần tạo trận đấu thực tế.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateMapRequest'
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateMapResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/init:
    post:
      tags:
        - Admin
      summary: Khởi tạo Game (Public / Admin)
      description: Khởi tạo một game thi đấu mới với bản đồ, thông số ngày, giới hạn nhiên liệu và vị trí Agent ban đầu.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameInitRequest'
      responses:
        '204':
          description: Khởi tạo thành công, không có nội dung trả về
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/teams:
    post:
      tags:
        - Admin
      summary: Đăng ký đội chơi mới (Public / Admin)
      description: Đăng ký một đội mới trên máy chủ và tạo JWT Token để truy cập các endpoint của đội đó.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeamRequest'
      responses:
        '201':
          description: Đăng ký thành công, trả về token truy cập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddTeamResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/{gameId}:
    delete:
      tags:
        - Admin
      summary: Xóa game và tất cả cấu hình liên quan (Public / Admin)
      description: Xóa hoàn toàn một trận đấu theo gameId.
      parameters:
        - name: gameId
          in: path
          required: true
          description: ID của game cần xóa
          schema:
            type: string
      responses:
        '204':
          description: Xóa game thành công, không có nội dung trả về
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/config:
    get:
      tags:
        - Config
      summary: Cấu hình bảng một lần cho đội gọi yêu cầu (CHỈ ĐỘI)
      description: Đọc cấu hình trận đấu ban đầu dành riêng cho đội thi đấu (yêu cầu xác thực token).
      security:
        - BearerAuth: []
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchConfigResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Trận đấu không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/board:
    get:
      tags:
        - Config
      summary: Cấu hình bảng/trận đấu độc lập với đội (Public)
      description: Phục vụ cả admin và người xem đọc thông tin bản đồ, ngày, nhiên liệu, ngưỡng traffic mà không cần JWT Token.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
        '400':
          description: Trận đấu không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/list:
    get:
      tags:
        - Config
      summary: Đọc danh sách tất cả cấu hình trận đấu hiện có (Public)
      description: Lấy danh sách toàn bộ các trận đấu trên hệ thống cùng thông số cấu hình tóm tắt của chúng.
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameListResponse'
        '500':
          description: Lỗi hệ thống không mong muốn
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/agent-types:
    post:
      tags:
        - Play
      summary: Chọn loại Agent trước trận đấu (CHỈ ĐỘI)
      description: Chọn loại tuần tra (patrol) hoặc nạp nhiên liệu (refuel) cho từng Agent của đội.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectAgentTypesRequest'
      responses:
        '204':
          description: Chọn loại Agent thành công, không có nội dung trả về
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Yêu cầu không hợp lệ
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/day:
    get:
      tags:
        - Play
      summary: Thông tin ngày hiện tại (CHỈ ĐỘI)
      description: Lấy vị trí, nhiên liệu, thời hạn và trạng thái giao thông của ngày hiện tại.
      security:
        - BearerAuth: []
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDayResponse'
        '401':
          description: Chưa xác thực
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Yêu cầu không hợp lệ hoặc game không chạy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/result:
    get:
      tags:
        - State & History
      summary: Bảng xếp hạng và chi tiết điểm số (Public)
      description: Tra cứu kết quả cuối cùng, thứ hạng và thông số phục vụ/loại hình của các đội.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResultResponse'
        '400':
          description: Trận đấu không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ==========================================
  # UNIMPLEMENTED ENDPOINTS (Not Implemented)
  # ==========================================

  /api/game/reset:
    post:
      tags:
        - Admin
      summary: "[Not Implemented] Đặt lại game về lúc bắt đầu"
      description: "[API chưa được hiện thực trong code] Đặt lại trạng thái game về thời điểm ban đầu để có thể phát lại."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - game_id
              properties:
                game_id:
                  type: string
      responses:
        '501':
          description: Chưa được hiện thực

  /api/game/actions:
    post:
      tags:
        - Play
      summary: "[Not Implemented] Nộp kế hoạch của một ngày (CHỈ ĐỘI)"
      description: "[API chưa được hiện thực trong code] Gửi danh sách các bước di chuyển cho từng Agent trong ngày thi đấu hiện tại."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitActionsRequest'
      responses:
        '501':
          description: Chưa được hiện thực
    get:
      tags:
        - State & History
      summary: "[Not Implemented] Kế hoạch đã nộp mỗi ngày"
      description: "[API chưa được hiện thực trong code] Đọc danh sách lịch sử các kế hoạch hành động đã nộp của các ngày."
      parameters:
        - name: game_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '501':
          description: Chưa được hiện thực

  /api/game/replay:
    get:
      tags:
        - State & History
      summary: "[Not Implemented] Phát lại từng bước của các ngày đã giải quyết"
      description: "[API chưa được hiện thực trong code] Tải dữ liệu khung hình diễn biến chi tiết từng bước của trận đấu để replay."
      parameters:
        - name: game_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '501':
          description: Chưa được hiện thực

  /api/game/state:
    get:
      tags:
        - State & History
      summary: Toàn bộ trạng thái game (Public)
      description: Tra cứu trạng thái trực tiếp của game bao gồm các đội, vị trí Agent, kho hàng và đường xá.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStateResponse'
        '400':
          description: Yêu cầu không hợp lệ (thiếu game_id)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trận đấu không tồn tại
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/game/practice/actions:
    post:
      tags:
        - Practice
      summary: "[Not Implemented] Nộp một ngày trong game luyện tập tự chọn tốc độ"
      description: "[API chưa được hiện thực trong code] Gửi kế hoạch di chuyển trong chế độ luyện tập."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitActionsRequest'
      responses:
        '501':
          description: Chưa được hiện thực

  /api/game/practice/peer:
    get:
      tags:
        - Practice
      summary: "[Not Implemented] Đọc nội dung phát lại luyện tập của đội khác"
      description: "[API chưa được hiện thực trong code] Xem lịch sử và kế hoạch của các đội thi đấu khác trong chế độ luyện tập."
      parameters:
        - name: game_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '501':
          description: Chưa được hiện thực

  /api/game/practice/copy:
    post:
      tags:
        - Practice
      summary: "[Not Implemented] Sao chép (fork) tiến trình luyện tập của đội khác"
      description: "[API chưa được hiện thực trong code] Copy lịch sử hành động của đội khác đến một ngày chỉ định trong chế độ luyện tập."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - game_id
                - from_game_id
                - from_team_id
                - upto_day
              properties:
                game_id:
                  type: string
                from_game_id:
                  type: string
                from_team_id:
                  type: string
                upto_day:
                  type: integer
      responses:
        '501':
          description: Chưa được hiện thực

  /api/game/practice/reset:
    post:
      tags:
        - Practice
      summary: "[Not Implemented] Đặt lại game luyện tập của riêng bạn"
      description: "[API chưa được hiện thực trong code] Khởi động lại trận đấu luyện tập về trạng thái ban đầu để thi đấu lại."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - game_id
              properties:
                game_id:
                  type: string
      responses:
        '501':
          description: Chưa được hiện thực

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    GenerateMapRequest:
      type: object
      description: Yêu cầu tạo bản đồ xem trước
      required:
        - width
        - height
        - teams
      properties:
        width:
          type: integer
          description: Chiều rộng bản đồ (từ 5 đến 50)
        height:
          type: integer
          description: Chiều cao bản đồ (từ 5 đến 50)
        teams:
          type: integer
          description: Số lượng đội tham gia (từ 2 đến 10)

    GenerateMapResponse:
      type: object
      description: Kết quả tạo bản đồ xem trước (cấu trúc phẳng)
      required:
        - width
        - height
        - cells
        - spots
      properties:
        width:
          type: integer
        height:
          type: integer
        cells:
          type: array
          items:
            type: array
            items:
              type: integer
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotResponse'

    GameInitRequest:
      type: object
      description: Yêu cầu khởi tạo trận đấu
      required:
        - gameId
        - startsAt
        - agentSelectionTimeLimit
        - daySeconds
        - daySteps
        - map
        - fuelLimits
        - players
        - busyThreshold
        - jammedThreshold
        - agents
      properties:
        gameId:
          type: string
          description: Mã định danh trận đấu (camelCase)
        startsAt:
          type: integer
          format: int64
          description: Thời điểm bắt đầu trận đấu (Unix timestamp)
        agentSelectionTimeLimit:
          type: number
          format: double
          description: Giới hạn thời gian chọn loại Agent (giây)
        daySeconds:
          type: array
          items:
            type: number
            format: double
          description: Thời gian (giây) tối đa dành cho mỗi ngày
        daySteps:
          type: array
          items:
            type: integer
          description: Số bước di chuyển tối đa trong mỗi ngày
        map:
          $ref: '#/components/schemas/MapRequest'
        fuelLimits:
          type: integer
          description: Giới hạn dung lượng nhiên liệu của Agent
        players:
          type: integer
          description: Số lượng người chơi / agent mỗi đội
        busyThreshold:
          type: number
          format: double
          description: Ngưỡng mật độ xe gây ùn tắc nhẹ
        jammedThreshold:
          type: number
          format: double
          description: Ngưỡng mật độ xe gây tắc nghẽn nặng
        agents:
          type: array
          items:
            type: integer
          description: Danh sách ô vị trí xuất phát ban đầu của Agent

    MapRequest:
      type: object
      description: Thông tin bản đồ yêu cầu khởi tạo
      required:
        - width
        - height
        - cells
        - spots
      properties:
        width:
          type: integer
        height:
          type: integer
        cells:
          type: array
          items:
            type: array
            items:
              type: integer
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotRequest'

    SpotRequest:
      type: object
      required:
        - brand
        - pos
        - stocks
      properties:
        brand:
          type: integer
        pos:
          type: integer
        stocks:
          type: integer

    SpotResponse:
      type: object
      required:
        - brand
        - pos
        - stocks
      properties:
        brand:
          type: integer
        pos:
          type: integer
        stocks:
          type: integer

    AddTeamRequest:
      type: object
      description: Yêu cầu thêm đội
      required:
        - teamId
      properties:
        teamId:
          type: string
          description: Mã định danh của đội (camelCase)

    AddTeamResponse:
      type: object
      description: Kết quả đăng ký đội (chứa token JWT)
      required:
        - teamId
        - token
      properties:
        teamId:
          type: string
        token:
          type: string

    MatchConfigResponse:
      type: object
      description: Cấu hình trận đấu trả về cho đội
      required:
        - startsAt
        - daySeconds
        - daySteps
        - map
        - spots
        - agents
        - fuelLimits
        - players
        - busyThreshold
        - jammedThreshold
      properties:
        startsAt:
          type: integer
          format: int64
        daySeconds:
          type: array
          items:
            type: number
            format: double
        daySteps:
          type: array
          items:
            type: integer
        map:
          $ref: '#/components/schemas/MapResponse'
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotResponse'
        agents:
          type: array
          items:
            type: integer
        fuelLimits:
          type: integer
        players:
          type: integer
        busyThreshold:
          type: number
          format: double
        jammedThreshold:
          type: number
          format: double

    BoardResponse:
      type: object
      description: Cấu hình bảng đấu toàn cục
      required:
        - gameId
        - startsAt
        - daySeconds
        - daySteps
        - map
        - spots
        - fuelLimits
        - players
        - busyThreshold
        - jammedThreshold
      properties:
        gameId:
          type: string
        startsAt:
          type: integer
          format: int64
        daySeconds:
          type: array
          items:
            type: number
            format: double
        daySteps:
          type: array
          items:
            type: integer
        map:
          $ref: '#/components/schemas/MapResponse'
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotResponse'
        fuelLimits:
          type: integer
        players:
          type: integer
        busyThreshold:
          type: number
          format: double
        jammedThreshold:
          type: number
          format: double

    MapResponse:
      type: object
      required:
        - height
        - width
        - cells
      properties:
        height:
          type: integer
        width:
          type: integer
        cells:
          type: array
          items:
            type: array
            items:
              type: integer

    SelectAgentTypesRequest:
      type: object
      description: Yêu cầu chọn loại Agent
      required:
        - game_id
        - types
      properties:
        game_id:
          type: string
        types:
          type: array
          items:
            type: integer
          description: Danh sách loại cho từng Agent (0=patrol, 1=refuel)

    GameDayResponse:
      type: object
      description: Thông tin ngày hiện tại
      required:
        - endsAt
        - day
        - agents
        - others
        - traffics
      properties:
        endsAt:
          type: number
          format: double
        day:
          type: integer
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentResponse'
        others:
          type: array
          items:
            $ref: '#/components/schemas/OtherTeamResponse'
        traffics:
          type: array
          items:
            $ref: '#/components/schemas/TrafficResponse'

    AgentResponse:
      type: object
      required:
        - kind
        - pos
        - fuel
      properties:
        kind:
          type: integer
        pos:
          type: integer
        fuel:
          type: integer

    OtherTeamResponse:
      type: object
      required:
        - id
        - agents
      properties:
        id:
          type: string
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentResponse'

    TrafficResponse:
      type: object
      required:
        - pos
        - status
      properties:
        pos:
          type: integer
        status:
          type: integer

    GameResultResponse:
      type: object
      description: Kết quả thi đấu và xếp hạng
      required:
        - ranking
        - detail
      properties:
        ranking:
          type: array
          items:
            type: string
        detail:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TeamDetailResponse'

    GameStateResponse:
      type: object
      description: Toàn bộ trạng thái trực tiếp của game
      required:
        - status
        - currentDay
        - remainingTime
        - mapStatus
        - teams
      properties:
        status:
          type: string
          enum: [NOT_STARTED, REGISTERING, PLAYING, FINISHED]
          description: Trạng thái hiện tại của trận đấu
        currentDay:
          type: integer
          description: Ngày thi đấu hiện tại (bắt đầu từ 0)
        remainingTime:
          type: integer
          format: int64
          description: Thời gian còn lại của ngày hiện tại (giây)
        mapStatus:
          type: array
          items:
            $ref: '#/components/schemas/TrafficResponse'
          description: Trạng thái mật độ giao thông trên toàn bản đồ
        teams:
          type: array
          items:
            $ref: '#/components/schemas/TeamStateResponse'
          description: Trạng thái chi tiết của từng đội tham gia

    TeamStateResponse:
      type: object
      required:
        - teamId
        - score
        - agents
      properties:
        teamId:
          type: string
          description: ID của đội thi đấu
        score:
          $ref: '#/components/schemas/TeamDetailResponse'
          description: Chi tiết điểm số của đội
        agents:
          type: array
          items:
            $ref: '#/components/schemas/AgentResponse'
          description: Danh sách Agent của đội

    TeamDetailResponse:
      type: object
      required:
        - distinct_types
        - cumulative_daily_types
        - total_servings
        - cumulative_response_time
      properties:
        distinct_types:
          type: integer
        cumulative_daily_types:
          type: integer
        total_servings:
          type: integer
        cumulative_response_time:
          type: number
          format: double

    SubmitActionsRequest:
      type: object
      required:
        - game_id
        - day
        - actions
      properties:
        game_id:
          type: string
        day:
          type: integer
        actions:
          type: array
          items:
            type: array
            items:
              type: integer

    ValidationErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
        rejectedValue:
          type: string
          nullable: true
        message:
          type: string

    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
        - timestamp
      properties:
        errorCode:
          type: string
        message:
          type: string
        timestamp:
          type: integer
          format: int64
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'

    GameListResponse:
      type: object
      description: Danh sách các cấu hình trận đấu
      required:
        - total
        - games
      properties:
        total:
          type: integer
          description: Tổng số lượng trận đấu
        games:
          type: array
          items:
            $ref: '#/components/schemas/GameSummaryResponse'

    GameSummaryResponse:
      type: object
      description: Thông tin tóm tắt cấu hình của một trận đấu
      required:
        - gameId
        - startsAt
        - players
        - fuelLimits
        - agentSelectionTimeLimit
        - busyThreshold
        - jammedThreshold
        - map
        - totalDays
      properties:
        gameId:
          type: string
          description: Mã định danh trận đấu
        startsAt:
          type: integer
          format: int64
          description: Thời điểm bắt đầu trận đấu (Unix timestamp)
        players:
          type: integer
          description: Số lượng Agent mỗi đội
        fuelLimits:
          type: integer
          description: Giới hạn dung lượng nhiên liệu của Agent
        agentSelectionTimeLimit:
          type: number
          format: double
          description: Giới hạn thời gian chọn loại Agent (giây)
        busyThreshold:
          type: number
          format: double
          description: Ngưỡng ô giao thông ùn tắc nhẹ
        jammedThreshold:
          type: number
          format: double
          description: Ngưỡng ô giao thông tắc nghẽn nặng
        map:
          $ref: '#/components/schemas/MapResponse'
        totalDays:
          type: integer
          description: Tổng số ngày thi đấu

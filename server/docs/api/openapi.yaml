openapi: 3.1.0
info:
  title: HEXUDON Server API Reference
  description: Tài liệu OpenAPI 3.1 cho máy chủ HEXUDON
  version: 0.1.0
servers:
  - url: /
tags:
  - name: Admin
    description: Thiết lập & vòng đời trận đấu (chỉ admin)
  - name: Config
    description: Cấu hình bảng / trận đấu mà máy khách đọc trước khi chơi
  - name: Play
    description: Lối chơi của đội (chọn loại Agent, nộp kế hoạch, đọc ngày)
  - name: State & History
    description: Trạng thái trực tiếp, bảng xếp hạng, lịch sử và replay
  - name: Practice
    description: Game luyện tập tự chọn tốc độ cho từng đội

paths:
  /api/game/generate:
    post:
      tags:
        - Admin
      summary: Tạo bản xem trước bản đồ hợp lệ theo luật (CHỈ ADMIN)
      description: Bao bọc MapGenerator để UI admin yêu cầu bảng đã được xác minh tính kết nối mà không tạo game thực tế.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateMapRequest'
            example:
              difficulty: easy
              teams: 2
              seed: 0
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateMapResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/init:
    post:
      tags:
        - Admin
      summary: Khởi tạo Game (CHỈ ADMIN)
      description: Khởi tạo một game thi đấu mới với bản đồ, thông số ngày, giới hạn nhiên liệu và danh sách đội.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameInitRequest'
      responses:
        '204':
          description: Khởi tạo thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/teams:
    post:
      tags:
        - Admin
      summary: Thêm một đội vào game giữa trận đấu (CHỈ ADMIN)
      description: Thêm đội thi đấu bổ sung vào game đang chạy.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeamRequest'
      responses:
        '204':
          description: Thêm đội thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/reset:
    post:
      tags:
        - Admin
      summary: Đặt lại game về lúc bắt đầu (CHỈ ADMIN)
      description: Đặt lại trạng thái game về thời điểm ban đầu để có thể phát lại.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameRequest'
      responses:
        '204':
          description: Đặt lại game thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/{game_id}:
    delete:
      tags:
        - Admin
      summary: Xóa game và tất cả các lượt nộp (CHỈ ADMIN)
      description: Xóa hoàn toàn một trận đấu theo game_id.
      parameters:
        - name: game_id
          in: path
          required: true
          description: ID của game cần xóa
          schema:
            type: string
      responses:
        '204':
          description: Xóa game thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/config:
    get:
      tags:
        - Config
      summary: Cấu hình bảng một lần cho đội gọi yêu cầu (CHỈ ĐỘI)
      description: Đọc cấu hình trận đấu ban đầu dành riêng cho đội thi đấu.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MatchConfigResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/board:
    get:
      tags:
        - Config
      summary: Cấu hình bảng/trận đấu độc lập với đội (Đội hoặc Admin)
      description: Phục vụ cả admin và người xem đọc thông tin bản đồ, ngày, nhiên liệu, ngưỡng traffic.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu (ID trần với đội, composite ID với admin ở chế độ practice)
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/agent-types:
    post:
      tags:
        - Play
      summary: Chọn loại Agent trước trận đấu (CHỈ ĐỘI)
      description: Chọn loại tuần tra (patrol) hoặc nạp nhiên liệu (refuel) cho từng Agent của đội.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectAgentTypesRequest'
      responses:
        '204':
          description: Chọn loại Agent thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/actions:
    post:
      tags:
        - Play
      summary: Nộp kế hoạch của một ngày (CHỈ ĐỘI)
      description: Gửi danh sách các bước di chuyển (kế hoạch) cho từng Agent trong ngày thi đấu hiện tại.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitActionsRequest'
      responses:
        '204':
          description: Nộp kế hoạch thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'
    get:
      tags:
        - State & History
      summary: Kế hoạch đã nộp mỗi ngày
      description: Đọc danh sách lịch sử các kế hoạch hành động đã nộp của các ngày.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetActionsResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/day:
    get:
      tags:
        - Play
      summary: Thông tin ngày hiện tại (CHỈ ĐỘI)
      description: Lấy vị trí, nhiên liệu, thời hạn và trạng thái giao thông của ngày hiện tại.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameDayResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/replay:
    get:
      tags:
        - State & History
      summary: Phát lại từng bước của các ngày đã giải quyết
      description: Tải dữ liệu khung hình diễn biến chi tiết từng bước của trận đấu để replay.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReplayResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/state:
    get:
      tags:
        - State & History
      summary: Toàn bộ trạng thái game (Đội hoặc Admin)
      description: Tra cứu trạng thái trực tiếp của game bao gồm các đội, vị trí Agent, kho hàng và đường xá.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameStateResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/result:
    get:
      tags:
        - State & History
      summary: Bảng xếp hạng và chi tiết điểm số (Đội hoặc Admin)
      description: Tra cứu kết quả cuối cùng, thứ hạng và thông số phục vụ/loại hình của các đội.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GameResultResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/practice/actions:
    post:
      tags:
        - Practice
      summary: Nộp một ngày trong game luyện tập tự chọn tốc độ
      description: Gửi kế hoạch di chuyển trong chế độ luyện tập.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeSubmitRequest'
      responses:
        '204':
          description: Nộp kế hoạch luyện tập thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/practice/peer:
    get:
      tags:
        - Practice
      summary: Đọc nội dung phát lại luyện tập của đội khác
      description: Xem lịch sử và kế hoạch của các đội thi đấu khác trong chế độ luyện tập.
      parameters:
        - name: game_id
          in: query
          required: true
          description: ID của trận đấu luyện tập
          schema:
            type: string
      responses:
        '200':
          description: Phản hồi thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PracticePeerResponse'
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/practice/copy:
    post:
      tags:
        - Practice
      summary: Sao chép (fork) tiến trình luyện tập của đội khác
      description: Copy lịch sử hành động của đội khác đến một ngày chỉ định trong chế độ luyện tập.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PracticeCopyRequest'
      responses:
        '204':
          description: Sao chép tiến trình thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

  /api/game/practice/reset:
    post:
      tags:
        - Practice
      summary: Đặt lại game luyện tập của riêng bạn
      description: Khởi động lại trận đấu luyện tập về trạng thái ban đầu để thi đấu lại.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GameRequest'
      responses:
        '204':
          description: Đặt lại game luyện tập thành công, không có nội dung trả về
        '422':
          $ref: '#/components/responses/ValidationErrorResponse'

components:
  responses:
    ValidationErrorResponse:
      description: Lỗi kiểm tra hợp lệ dữ liệu đầu vào
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/HTTPValidationError'

  schemas:
    GenerateMapRequest:
      type: object
      description: Yêu cầu tạo bản đồ xem trước
      required:
        - difficulty
        - teams
      properties:
        difficulty:
          type: string
          description: Mức độ khó của bản đồ
        teams:
          type: integer
          description: Số lượng đội tham gia (2 đến 10)
          minimum: 2
          maximum: 10
        seed:
          type: integer
          nullable: true
          description: Hạt giống sinh ngẫu nhiên

    GenerateMapResponse:
      type: object
      description: Kết quả tạo bản đồ xem trước
      required:
        - map
        - spots
      properties:
        map:
          $ref: '#/components/schemas/MapInit'
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotInit'

    GameInitRequest:
      type: object
      description: Yêu cầu khởi tạo trận đấu
      required:
        - game_id
        - startsAt
        - daySeconds
        - daySteps
        - map
        - spots
        - fuelLimits
        - players
        - busyThreshold
        - jammedThreshold
        - teams
        - agent_selection_time_limit
        - is_practice
      properties:
        game_id:
          type: string
          description: Mã định danh trận đấu
        startsAt:
          type: number
          description: Thời điểm bắt đầu trận đấu (Unix timestamp)
        daySeconds:
          type: array
          items:
            type: number
          minItems: 1
          description: Thời gian (giây) tối đa dành cho mỗi ngày
        daySteps:
          type: array
          items:
            type: integer
          minItems: 1
          description: Số bước di chuyển tối đa trong mỗi ngày
        map:
          $ref: '#/components/schemas/MapInit'
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotInit'
        fuelLimits:
          type: integer
          exclusiveMinimum: 0
          description: Giới hạn dung lượng nhiên liệu của Agent
        players:
          type: integer
          minimum: 1
          description: Số lượng người chơi / agent mỗi đội
        busyThreshold:
          type: integer
          description: Ngưỡng mật độ xe gây ùn tắc nhẹ
        jammedThreshold:
          type: integer
          description: Ngưỡng mật độ xe gây tắc nghẽn nặng
        teams:
          type: array
          items:
            $ref: '#/components/schemas/TeamInit'
          minItems: 1
        agent_selection_time_limit:
          type: number
          description: Giới hạn thời gian chọn loại Agent (giây)
        is_practice:
          type: boolean
          description: Cờ xác định trận đấu luyện tập

    AddTeamRequest:
      type: object
      description: Yêu cầu thêm đội vào game đang chạy
      required:
        - game_id
        - team_id
        - agents
      properties:
        game_id:
          type: string
          description: Mã định danh trận đấu
        team_id:
          oneOf:
            - type: string
            - type: integer
          description: Mã định danh đội
        agents:
          type: array
          items:
            type: integer
          minItems: 3
          maxItems: 8
          description: Danh sách vị trí xuất phát ban đầu của Agent

    GameRequest:
      type: object
      description: Yêu cầu chứa game_id đơn giản
      required:
        - game_id
      properties:
        game_id:
          type: string
          description: Mã định danh trận đấu

    MapInit:
      type: object
      description: Thông tin khởi tạo bản đồ
      required:
        - height
        - width
        - cells
      properties:
        height:
          type: integer
          description: Chiều cao bản đồ (số hàng)
        width:
          type: integer
          description: Chiều rộng bản đồ (số cột)
        cells:
          type: array
          items:
            type: array
            items:
              type: integer
          description: Ma trận loại ô bàn chơi

    SpotInit:
      type: object
      description: Thông tin vị trí cửa hàng / thương hiệu
      required:
        - brand
        - pos
        - stocks
      properties:
        brand:
          type: integer
          description: Mã thương hiệu
        pos:
          type: integer
          description: Vị trí ô trên bản đồ
        stocks:
          type: integer
          minimum: 1
          description: Số lượng tồn kho cửa hàng

    TeamInit:
      type: object
      description: Cấu hình đội thi đấu ban đầu
      required:
        - team_id
        - agents
      properties:
        team_id:
          oneOf:
            - type: string
            - type: integer
          description: Mã đội thi đấu
        agents:
          type: array
          items:
            type: integer
          minItems: 3
          maxItems: 8
          description: Danh sách ô vị trí ban đầu của Agent

    MatchConfigResponse:
      type: object
      description: Cấu hình trận đấu trả về cho đội
      required:
        - startsAt
        - daySeconds
        - daySteps
        - map
        - spots
        - agents
        - fuelLimits
        - players
        - busyThreshold
        - jammedThreshold
      properties:
        startsAt:
          type: number
          description: Timestamp bắt đầu game
        daySeconds:
          type: array
          items:
            type: number
          description: Thời gian dành cho từng ngày
        daySteps:
          type: array
          items:
            type: integer
          description: Số bước tối đa của từng ngày
        map:
          $ref: '#/components/schemas/MapInit'
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotInit'
        agents:
          type: array
          items:
            type: integer
          description: Vị trí ban đầu của các Agent của đội
        fuelLimits:
          type: integer
          description: Dung lượng bình nhiên liệu
        players:
          type: integer
          description: Số lượng Agent của đội
        busyThreshold:
          type: number
          description: Ngưỡng ùn tắc giao thông nhẹ
        jammedThreshold:
          type: number
          description: Ngưỡng tắc nghẽn giao thông nặng

    BoardResponse:
      type: object
      description: Cấu hình bảng đấu toàn cục
      required:
        - game_id
        - is_practice
        - no_reset
        - startsAt
        - daySeconds
        - daySteps
        - map
        - spots
        - fuelLimits
        - players
        - busyThreshold
        - jammedThreshold
        - agent_selection_time_limit
      properties:
        game_id:
          type: string
          description: Mã định danh trận đấu
        is_practice:
          type: boolean
          description: Cờ trận đấu luyện tập
        no_reset:
          type: boolean
          description: Cờ không cho phép reset
        startsAt:
          type: number
          description: Timestamp bắt đầu
        daySeconds:
          type: array
          items:
            type: number
        daySteps:
          type: array
          items:
            type: integer
        map:
          $ref: '#/components/schemas/MapInit'
        spots:
          type: array
          items:
            $ref: '#/components/schemas/SpotInit'
        fuelLimits:
          type: integer
        players:
          type: integer
        busyThreshold:
          type: number
        jammedThreshold:
          type: number
        agent_selection_time_limit:
          type: number

    SelectAgentTypesRequest:
      type: object
      description: Yêu cầu chọn loại Agent
      required:
        - game_id
        - types
      properties:
        game_id:
          type: string
          description: Mã định danh trận đấu
        types:
          type: array
          items:
            type: integer
          description: Danh sách loại cho từng Agent (0=patrol, 1=refuel)

    SubmitActionsRequest:
      type: object
      description: Yêu cầu nộp kế hoạch bước đi cho ngày
      required:
        - game_id
        - day
        - actions
      properties:
        game_id:
          type: string
          description: Mã định danh trận đấu
        day:
          type: integer
          description: Chỉ số ngày nộp kế hoạch (bắt đầu từ 0)
        actions:
          type: array
          items:
            type: array
            items:
              type: integer
          description: Danh sách chuỗi hành động di chuyển của các Agent

    GameDayResponse:
      type: object
      description: Thông tin ngày hiện tại
      required:
        - endsAt
        - day
        - agents
        - others
        - traffics
      properties:
        endsAt:
          type: number
          description: Thời điểm kết thúc ngày
        day:
          type: integer
          description: Chỉ số ngày hiện tại
        agents:
          type: array
          items:
            type: object
            required:
              - kind
              - pos
              - fuel
            properties:
              kind:
                type: integer
                description: Loại Agent
              pos:
                type: integer
                description: Vị trí hiện tại
              fuel:
                type: integer
                description: Mức nhiên liệu còn lại
        others:
          type: array
          items:
            type: object
            required:
              - id
              - agents
            properties:
              id:
                oneOf:
                  - type: string
                  - type: integer
                description: ID đối thủ
              agents:
                type: array
                items:
                  type: object
                  properties:
                    kind:
                      type: integer
                    pos:
                      type: integer
                    fuel:
                      type: integer
        traffics:
          type: array
          items:
            type: object
            required:
              - pos
              - status
            properties:
              pos:
                type: integer
                description: Vị trí ô giao thông
              status:
                type: integer
                description: Trạng thái traffic (0=bình thường, 1=ùn tắc, 2=tắc nghẽn)

    GetActionsResponse:
      type: array
      description: Danh sách lịch sử nộp hành động của các ngày
      items:
        type: object
        properties:
          actions:
            type: array
            items:
              type: object
              properties:
                day:
                  type: integer
                team_id:
                  type: string
                plan:
                  type: array
                  items:
                    type: array
                    items:
                      type: integer
                submitted_at:
                  type: number
                submit_count:
                  type: integer

    ReplayResponse:
      type: object
      description: Dữ liệu phát lại trận đấu
      required:
        - days
      properties:
        days:
          type: array
          items:
            type: object
            properties:
              day:
                type: integer
              total_steps:
                type: integer
              road_condition:
                type: object
                additionalProperties:
                  type: integer
              team:
                type: object
                properties:
                  team_id:
                    type: string
                  kinds:
                    type: array
                    items:
                      type: integer
                  final_servings:
                    type: integer
                  final_types:
                    type: integer
                  submitted:
                    type: boolean
                  significant_frames:
                    type: array
                    items:
                      type: object

    GameStateResponse:
      type: object
      description: Trạng thái toàn cục trận đấu
      required:
        - status
        - day
        - steps_today
        - day_deadline_in
        - road_condition
        - teams
      properties:
        status:
          type: string
          description: Trạng thái (in_progress, finished...)
        day:
          type: integer
          description: Ngày hiện tại
        steps_today:
          type: integer
          description: Số bước đã thực hiện trong ngày
        day_deadline_in:
          type: number
          description: Thời gian đếm ngược còn lại của ngày
        road_condition:
          type: object
          additionalProperties:
            type: integer
          description: Tình trạng giao thông trên các ô
        teams:
          type: object
          additionalProperties:
            type: object

    GameResultResponse:
      type: object
      description: Kết quả thi đấu và xếp hạng
      required:
        - ranking
        - detail
      properties:
        ranking:
          type: array
          items:
            type: string
          description: Danh sách team_id theo thứ hạng từ cao xuống thấp
        detail:
          type: object
          additionalProperties:
            type: object
            properties:
              distinct_types:
                type: integer
              cumulative_daily_types:
                type: integer
              total_servings:
                type: integer
              cumulative_response_time:
                type: number

    PracticeSubmitRequest:
      type: object
      description: Yêu cầu nộp kế hoạch trong trận luyện tập
      required:
        - game_id
        - day
        - actions
      properties:
        game_id:
          type: string
        day:
          type: integer
        actions:
          type: array
          items:
            type: array
            items:
              type: integer

    PracticePeerResponse:
      type: object
      description: Lịch sử thi đấu luyện tập của đối thủ
      required:
        - game_id
        - history
      properties:
        game_id:
          type: string
        history:
          type: array
          items:
            type: object
            properties:
              day:
                type: integer
              state:
                type: object
              actions:
                type: object

    PracticeCopyRequest:
      type: object
      description: Yêu cầu sao chép tiến trình luyện tập của đội khác
      required:
        - game_id
        - from_game_id
        - from_team_id
        - upto_day
      properties:
        game_id:
          type: string
          description: ID trận luyện tập hiện tại của bạn
        from_game_id:
          type: string
          description: ID trận nguồn cần sao chép
        from_team_id:
          oneOf:
            - type: string
            - type: integer
          description: ID đội nguồn cần sao chép
        upto_day:
          type: integer
          description: Sao chép cho tới ngày chỉ định

    ValidationError:
      type: object
      description: Chi tiết lỗi validation
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
        msg:
          type: string
        type:
          type: string
        input:
          nullable: true
        ctx:
          type: object

    HTTPValidationError:
      type: object
      description: Danh sách các lỗi kiểm tra hợp lệ
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
